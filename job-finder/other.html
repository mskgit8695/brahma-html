<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume</title>

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }
    .header {
      background: #28a745;
      color: #fff;
      padding: 30px;
      border-radius: 10px;
    }
    .profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #fff;
    }
    .card-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .section-title {
      font-weight: bold;
      margin-bottom: 15px;
    }
    .icon-box {
      color: #28a745;
      font-size: 20px;
      margin-right: 10px;
    }
    .btn-custom {
      border-radius: 20px;
    }


    .resumeUpload .resumeName h4{
      margin-bottom: 0;
      font-size: 16px;
      font-weight: bold;
    }
    .resumeUpload .resumeName p{
      font-size: 12px;
    }
    .resumeUpload .resumeIcons svg{
      fill:#007bff;
    }
    .resumeUpload .resumeIcons .uploadBtn{
      position: relative;
      display: inline-block;
    }
    .resumeUpload .resumeIcons .uploadBtn .customInput{
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 1;
    }
    .resumeUpload .resumeIcons .uploadBtn .customInput::file-selector-button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container my-4">

  <div class="row mt-4">
    <div class="col-md-4">

      <div class="card-box shadow-sm">
        <h5 class="section-title"> Info</h5>
        <h5 class="section-title"> Info</h5>
      </div>

    </div>
    <div class="col-md-8">
      <div class="card-box shadow-sm ">
        <h5 class="section-title mb-4">Resume</h5>
        <div class="resumeUpload d-flex justify-content-between align-items-center">
          <div class="resumeName">
          <h4>Lalit-Thakur.pdf</h4>
          <p class="text-secondary mb-0">Uploaded on Mar 30, 2026</p>
        </div>
        <div class="resumeIcons">
          <span class="uploadBtn">
          <button type="button" class="btn btn-outline-primary">Update Resume</button>
          <input type="file" class="customInput">
          </span>
          <button type="button" class="btn" style="background-color: #f7f7f9;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 512 512"><path d="M256 464a208 208 0 1 1 0-416 208 208 0 1 1 0 416zM256 0a256 256 0 1 0 0 512 256 256 0 1 0 0-512zM244.7 387.3c6.2 6.2 16.4 6.2 22.6 0l104-104c4.6-4.6 5.9-11.5 3.5-17.4S366.5 256 360 256l-72 0 0-104c0-13.3-10.7-24-24-24l-16 0c-13.3 0-24 10.7-24 24l0 104-72 0c-6.5 0-12.3 3.9-14.8 9.9s-1.1 12.9 3.5 17.4l104 104z"/></svg>
          </button>
          <button type="button" class="btn " style="background-color: #f7f7f9;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 448 512"><path d="M166.2-16c-13.3 0-25.3 8.3-30 20.8L120 48 24 48C10.7 48 0 58.7 0 72S10.7 96 24 96l400 0c13.3 0 24-10.7 24-24s-10.7-24-24-24l-96 0-16.2-43.2C307.1-7.7 295.2-16 281.8-16L166.2-16zM32 144l0 304c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-304-48 0 0 304c0 8.8-7.2 16-16 16L96 464c-8.8 0-16-7.2-16-16l0-304-48 0zm160 72c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 176c0 13.3 10.7 24 24 24s24-10.7 24-24l0-176zm112 0c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 176c0 13.3 10.7 24 24 24s24-10.7 24-24l0-176z"/></svg>
          </button>
        </div>
        </div>
      </div>

    </div>
    

  </div>

</div>

</body>
</html>
